<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo de Aplicaciones Corporativas</title>
  <link rel="stylesheet" href="frontend/css/styles.css">
</head>
<body>
<div id="app">

  <!-- ====== NAVBAR ====== -->
  <nav id="navbar" class="navbar" style="display:none">
    <a href="#" class="navbar-brand" onclick="App.navigate('projects')">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      <span>AppCatalog</span>
      <span class="sep">/</span>
      <span id="nav-user-name" style="color:var(--text-secondary)"></span>
    </a>
    <div class="navbar-actions">
      <button class="btn btn-ghost btn-sm admin-only" onclick="App.navigate('technologies')">Tecnologías</button>
      <button class="btn btn-ghost btn-sm admin-only" onclick="App.navigate('users')">Usuarios</button>
      <button class="btn btn-primary btn-sm admin-only" onclick="openProjectModal()">+ Nuevo Proyecto</button>
      <button class="btn btn-ghost btn-sm" onclick="toggleTheme()" id="theme-toggle">☀️</button>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">Salir</button>
    </div>
  </nav>

  <!-- ====== PAGE: LOGIN ====== -->
  <div id="page-login" class="page login-page active">
    <div class="login-box">
      <div class="login-logo">
        <div class="icon-wrap">
          <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
        </div>
        <h1>AppCatalog</h1>
        <p>Catálogo de Aplicaciones Corporativas</p>
      </div>
      <form id="login-form" autocomplete="off">
        <div class="form-group">
          <label for="l-email">Email</label>
          <input class="form-control" type="email" name="email" id="l-email" placeholder="usuario@empresa.com" required>
        </div>
        <div class="form-group">
          <label for="l-pass">Contraseña</label>
          <input class="form-control" type="password" name="password" id="l-pass" required>
        </div>
        <p id="login-error" style="color:var(--red);font-size:12px;margin-bottom:12px"></p>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">
          <span id="login-btn-text">Entrar</span>
        </button>
      </form>
      <p style="text-align:center;font-size:11px;color:var(--text-muted);margin-top:20px">
        Demo: admin@empresa.com / Admin1234!
      </p>
    </div>
  </div>

  <!-- ====== PAGE: PROJECTS LIST ====== -->
  <div id="page-projects" class="page">
    <div class="main-content">
      <div class="section-header">
        <h2>Proyectos</h2>
        <button class="btn btn-primary admin-only" onclick="openProjectModal()">+ Nuevo Proyecto</button>
      </div>

      <!-- Filtros -->
      <div class="filters-bar">
        <input type="search" id="filter-search" class="form-control filter-search" placeholder="Buscar por nombre o descripción…">
        <select id="filter-status" class="form-control">
          <option value="">Todos los estados</option>
          <option value="production">Producción</option>
          <option value="dev">Desarrollo</option>
          <option value="stopped">Parado</option>
        </select>
        <select id="filter-owner" class="form-control"><option>Cargando…</option></select>
        <select id="filter-tech" class="form-control"><option>Cargando…</option></select>
      </div>

      <div id="projects-container"></div>
      <div id="pagination" class="pagination"></div>
    </div>
  </div>

  <!-- ====== PAGE: PROJECT DETAIL ====== -->
  <div id="page-project-detail" class="page">
    <div class="main-content">
      <button class="back-btn" onclick="App.navigate('projects')">
        ← Volver al listado
      </button>
      <div id="project-detail-content"></div>
    </div>
  </div>

  <!-- ====== PAGE: TECHNOLOGIES (admin) ====== -->
  <div id="page-technologies" class="page">
    <div class="main-content">
      <div class="section-header">
        <h2>Tecnologías</h2>
        <button class="btn btn-primary" onclick="openTechModal()">+ Nueva</button>
      </div>
      <div style="background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
        <table style="width:100%;border-collapse:collapse">
          <thead>
            <tr style="border-bottom:1px solid var(--border)">
              <th style="padding:12px 16px;text-align:left;font-size:11px;color:var(--text-muted);font-weight:500;letter-spacing:.06em;text-transform:uppercase">Nombre</th>
              <th style="padding:12px 16px;text-align:left;font-size:11px;color:var(--text-muted);font-weight:500;letter-spacing:.06em;text-transform:uppercase">Color</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tech-tbody" style="font-size:13px">
            <tr><td colspan="3" class="loading">Cargando</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ====== PAGE: USERS (admin) ====== -->
  <div id="page-users" class="page">
    <div class="main-content">
      <div class="section-header">
        <h2>Usuarios</h2>
        <button class="btn btn-primary" onclick="openUserModal()">+ Nuevo Usuario</button>
      </div>
      <div style="background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
        <table style="width:100%;border-collapse:collapse">
          <thead>
            <tr style="border-bottom:1px solid var(--border)">
              <th style="padding:12px 16px;text-align:left;font-size:11px;color:var(--text-muted);font-weight:500;letter-spacing:.06em;text-transform:uppercase">Nombre</th>
              <th style="padding:12px 16px;text-align:left;font-size:11px;color:var(--text-muted);font-weight:500;letter-spacing:.06em;text-transform:uppercase">Email</th>
              <th style="padding:12px 16px;text-align:left;font-size:11px;color:var(--text-muted);font-weight:500;letter-spacing:.06em;text-transform:uppercase">Rol</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="users-tbody" style="font-size:13px">
            <tr><td colspan="4" class="loading">Cargando</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div><!-- /app -->

<!-- ====== MODAL: Project Form ====== -->
<div id="project-modal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="project-modal-title">Nuevo Proyecto</h3>
      <button id="project-modal-close" class="btn btn-ghost btn-icon">✕</button>
    </div>
    <form id="project-form" autocomplete="off">
      <input type="hidden" id="project-form-id">
      <div class="form-group">
        <label>Nombre *</label>
        <input class="form-control" id="pf-name" required placeholder="Nombre del proyecto">
      </div>
      <div class="form-group">
        <label>Descripción</label>
        <textarea class="form-control" id="pf-description" rows="3" placeholder="Descripción breve…"></textarea>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group">
          <label>Responsable principal *</label>
          <select class="form-control" id="pf-owner" required></select>
        </div>
        <div class="form-group">
          <label>Responsable secundario</label>
          <select class="form-control" id="pf-sec-owner"></select>
        </div>
      </div>
      <div class="form-group">
        <label>Estado</label>
        <select class="form-control" id="pf-status">
          <option value="dev">Desarrollo</option>
          <option value="production">Producción</option>
          <option value="stopped">Parado</option>
        </select>
      </div>
      <div class="form-group">
        <label>Tecnologías</label>
        <div id="pf-tech-picker" class="tech-picker"></div>
      </div>
      <div class="form-group">
        <label>Repositorio Git</label>
        <input class="form-control" id="pf-git" placeholder="git@gitlab.empresa.com:…">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group">
          <label>Servidor</label>
          <input class="form-control" id="pf-server" placeholder="srv-prod-01">
        </div>
        <div class="form-group">
          <label>URL</label>
          <input class="form-control" id="pf-url" type="url" placeholder="https://…">
        </div>
      </div>
      <div class="form-group">
        <label>Ubicación de credenciales</label>
        <input class="form-control" id="pf-creds" placeholder="Vault > secret/proyecto > credenciales">
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" id="project-modal-close2" onclick="document.getElementById('project-modal').classList.remove('open')">Cancelar</button>
        <button type="submit" class="btn btn-primary">Guardar</button>
      </div>
    </form>
  </div>
</div>

<!-- ====== MODAL: Technology Form ====== -->
<div id="tech-modal" class="modal-overlay">
  <div class="modal" style="max-width:400px">
    <div class="modal-header">
      <h3 id="tech-modal-title">Nueva Tecnología</h3>
      <button id="tech-modal-close" class="btn btn-ghost btn-icon">✕</button>
    </div>
    <form id="tech-form">
      <input type="hidden" id="tech-form-id">
      <div class="form-group">
        <label>Nombre *</label>
        <input class="form-control" id="tech-form-name" required placeholder="PHP, MySQL, React…">
      </div>
      <div class="form-group">
        <label>Color (hex)</label>
        <input class="form-control" id="tech-form-color" type="color" value="#6366f1" style="padding:4px;height:40px;cursor:pointer">
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" onclick="document.getElementById('tech-modal').classList.remove('open')">Cancelar</button>
        <button type="submit" class="btn btn-primary">Guardar</button>
      </div>
    </form>
  </div>
</div>

<!-- ====== MODAL: User Form ====== -->
<div id="user-modal" class="modal-overlay">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <h3 id="user-modal-title">Nuevo Usuario</h3>
      <button id="user-modal-close" class="btn btn-ghost btn-icon">✕</button>
    </div>
    <form id="user-form">
      <input type="hidden" id="user-form-id">
      <div class="form-group">
        <label>Nombre *</label>
        <input class="form-control" id="user-form-name" required>
      </div>
      <div class="form-group">
        <label>Email *</label>
        <input class="form-control" id="user-form-email" type="email" required>
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input class="form-control" id="user-form-pass" type="password" placeholder="Mín. 8 caracteres" autocomplete="new-password">
        <small id="user-pass-note" style="display:none;font-size:11px;color:var(--text-muted)">Dejar en blanco para no cambiarla</small>
      </div>
      <div class="form-group">
        <label>Rol</label>
        <select class="form-control" id="user-form-role">
          <option value="viewer">Viewer</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" onclick="document.getElementById('user-modal').classList.remove('open')">Cancelar</button>
        <button type="submit" class="btn btn-primary">Guardar</button>
      </div>
    </form>
  </div>
</div>

<!-- ====== Confirm Dialog ====== -->
<div id="confirm-overlay" class="modal-overlay">
  <div class="modal" style="max-width:380px">
    <p id="confirm-message" style="font-size:14px;margin-bottom:24px;line-height:1.5"></p>
    <div style="display:flex;justify-content:flex-end;gap:8px">
      <button id="confirm-no"  class="btn btn-ghost">Cancelar</button>
      <button id="confirm-yes" class="btn btn-danger">Confirmar</button>
    </div>
  </div>
</div>

<!-- ====== Toast Container ====== -->
<div id="toast-container"></div>

<!-- ====== Scripts ====== -->
<script src="frontend/js/api.js"></script>
<script src="frontend/js/app.js"></script>
<script src="frontend/js/pages.js"></script>
<script>
  async function doLogout() {
    try { await Auth.logout(); } catch {}
    App.setUser(null);
    App.navigate('login');
  }
</script>
</body>
</html>
